<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web 2.5D Avatar - Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        
        #character-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; max-width: 500px; position: relative; z-index: 10; }
        
        /* なめらかな動きを作るためのトランジション（AIの微細なブレを吸収） */
        svg#character { width: 100%; height: auto; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15)); overflow: visible; }
        .layer { transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1); }
        .part { transition: all 0.08s cubic-bezier(0.25, 1, 0.5, 1); }

        #controls { position: absolute; bottom: 30px; width: 100%; max-width: 400px; text-align: center; z-index: 999; }
        .btn { display: inline-block; width: 90%; padding: 18px; background: rgba(255, 255, 255, 0.9); color: #4f46e5; border: none; border-radius: 50px; font-size: 1.2rem; font-weight: 900; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; backdrop-filter: blur(5px); }
        .btn:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        #status { margin-top: 12px; font-size: 0.95rem; color: #fff; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 90px; height: 120px; border-radius: 12px; object-fit: cover; border: 3px solid rgba(255,255,255,0.8); box-shadow: 0 8px 16px rgba(0,0,0,0.2); transform: scaleX(-1); z-index: 5; display: none; }
        #debug-log { display: none; } /* 本番用なのでログは非表示 */
    </style>
    
    <!-- 安定のモジュールレス読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <!-- キャラクターエリア -->
    <div id="character-container">
        <!-- viewBoxを-200 -200にすることで、顔の中心が常にX:0, Y:0になり、3D回転の計算が完璧になります -->
        <svg id="character" viewBox="-200 -200 400 400">
            <defs>
                <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FFF0E5" />
                    <stop offset="100%" stop-color="#FFD6C2" />
                </linearGradient>
                <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4A3B42" />
                    <stop offset="100%" stop-color="#2D2329" />
                </linearGradient>
                <!-- ほっぺのぼかし -->
                <radialGradient id="blush" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#FF8A8A" stop-opacity="0.7"/>
                    <stop offset="100%" stop-color="#FF8A8A" stop-opacity="0"/>
                </radialGradient>
            </defs>

            <!-- 【グループ全体】首の傾き（Roll）をここに適用 -->
            <g id="head-group" class="layer">
                
                <!-- 【奥のレイヤー】後ろ髪（顔と逆方向に少し動く） -->
                <g id="layer-back" class="layer">
                    <circle cx="0" cy="20" r="140" fill="url(#hairGrad)" />
                    <!-- 耳 -->
                    <circle cx="-135" cy="15" r="25" fill="#FFD6C2" stroke="#DCA37A" stroke-width="3" />
                    <circle cx="135" cy="15" r="25" fill="#FFD6C2" stroke="#DCA37A" stroke-width="3" />
                </g>

                <!-- 【中間のレイヤー】顔のベース（中心点） -->
                <g id="layer-mid" class="layer">
                    <!-- 輪郭 -->
                    <path d="M -130 -20 C -130 90, -70 150, 0 155 C 70 150, 130 90, 130 -20 Z" fill="url(#skinGrad)" />
                    <!-- ほっぺ -->
                    <circle cx="-75" cy="45" r="25" fill="url(#blush)" />
                    <circle cx="75" cy="45" r="25" fill="url(#blush)" />
                </g>

                <!-- 【手前のレイヤー】顔のパーツ（顔の向きに合わせて大きく動く） -->
                <g id="layer-front" class="layer">
                    <!-- 眉毛 -->
                    <path id="brow-L" class="part" d="M -90 -55 Q -60 -70 -30 -55" fill="none" stroke="#2D2329" stroke-width="8" stroke-linecap="round" />
                    <path id="brow-R" class="part" d="M 30 -55 Q 60 -70 90 -55" fill="none" stroke="#2D2329" stroke-width="8" stroke-linecap="round" />

                    <!-- 左目 -->
                    <g id="eye-L-group" class="part">
                        <ellipse cx="-60" cy="-15" rx="25" ry="30" fill="#FFF" />
                        <ellipse id="pupil-L" class="part" cx="-60" cy="-15" rx="14" ry="18" fill="#5E35B1" />
                        <circle id="high-L" class="part" cx="-65" cy="-22" r="6" fill="#FFF" />
                        <!-- まぶた（まばたきで上から降りてくる） -->
                        <path id="eyelid-L" class="part" d="M -95 -15 Q -60 -60 -25 -15 Z" fill="#FFD6C2" />
                        <path class="part" d="M -90 -20 Q -60 -50 -30 -20" fill="none" stroke="#2D2329" stroke-width="4" stroke-linecap="round"/>
                    </g>

                    <!-- 右目 -->
                    <g id="eye-R-group" class="part">
                        <ellipse cx="60" cy="-15" rx="25" ry="30" fill="#FFF" />
                        <ellipse id="pupil-R" class="part" cx="60" cy="-15" rx="14" ry="18" fill="#5E35B1" />
                        <circle id="high-R" class="part" cx="55" cy="-22" r="6" fill="#FFF" />
                        <!-- まぶた -->
                        <path id="eyelid-R" class="part" d="M 25 -15 Q 60 -60 95 -15 Z" fill="#FFD6C2" />
                        <path class="part" d="M 30 -20 Q 60 -50 90 -20" fill="none" stroke="#2D2329" stroke-width="4" stroke-linecap="round"/>
                    </g>

                    <!-- 鼻（少し高さを出す） -->
                    <path id="nose" class="part" d="M 0 35 L -6 45 L 6 45 Z" fill="#DCA37A" />

                    <!-- 口（笑顔と開閉を精密に制御） -->
                    <path id="mouth" class="part" d="M -25 75 Q 0 80 25 75 Q 0 90 -25 75 Z" fill="#D81B60" stroke="#880E4F" stroke-width="3" stroke-linejoin="round" />
                </g>

                <!-- 【最前面のレイヤー】前髪（最も大きく動き、立体感を強調する） -->
                <g id="layer-top" class="layer">
                    <path d="M -140 -20 C -140 -150, 140 -150, 140 -20 C 110 -60, 80 -10, 40 -60 C 0 -10, -30 -70, -70 -20 C -100 -60, -120 -10, -140 -20 Z" fill="url(#hairGrad)" />
                    <!-- 触角ヘア -->
                    <path d="M -120 -20 Q -150 50 -130 100 Q -110 40 -90 -20 Z" fill="url(#hairGrad)" />
                    <path d="M 120 -20 Q 150 50 130 100 Q 110 40 90 -20 Z" fill="url(#hairGrad)" />
                </g>
            </g>
        </svg>
    </div>

    <div id="controls">
        <button id="start-btn" class="btn">🚀 AI システム起動</button>
        <p id="status">システムスタンバイ完了</p>
    </div>

    <script>
        window.onload = () => {
            const startBtn = document.getElementById("start-btn");
            const statusText = document.getElementById("status");
            const videoElement = document.getElementById("webcam");
            
            // SVGレイヤー
            const headGroup = document.getElementById("head-group");
            const layerBack = document.getElementById("layer-back");
            const layerMid = document.getElementById("layer-mid");
            const layerFront = document.getElementById("layer-front");
            const layerTop = document.getElementById("layer-top");
            
            // 顔パーツ
            const eyelidL = document.getElementById("eyelid-L");
            const eyelidR = document.getElementById("eyelid-R");
            const pupilL = document.getElementById("pupil-L");
            const pupilR = document.getElementById("pupil-R");
            const highL = document.getElementById("high-L");
            const highR = document.getElementById("high-R");
            const browL = document.getElementById("brow-L");
            const browR = document.getElementById("brow-R");
            const mouth = document.getElementById("mouth");
            const nose = document.getElementById("nose");

            let camera;

            startBtn.addEventListener("click", async () => {
                startBtn.disabled = true;
                startBtn.textContent = "⏳ 魔法陣を展開中...";
                statusText.textContent = "AIモデルの準備をしています...";

                try {
                    const faceMesh = new FaceMesh({locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                    }});
                    
                    faceMesh.setOptions({
                        maxNumFaces: 1,
                        refineLandmarks: true, // 目の瞳孔（虹彩）のトラッキングを有効化
                        minDetectionConfidence: 0.6,
                        minTrackingConfidence: 0.6
                    });
                    
                    faceMesh.onResults(onResults);

                    camera = new Camera(videoElement, {
                        onFrame: async () => {
                            await faceMesh.send({image: videoElement});
                        },
                        width: 480, height: 640
                    });
                    
                    await camera.start();
                    videoElement.style.display = "block";
                    startBtn.style.display = "none";
                    statusText.textContent = "✨ カメラに顔を向けてください ✨";

                } catch (error) {
                    statusText.textContent = "起動エラー：カメラの許可が必要です";
                    startBtn.disabled = false;
                    startBtn.textContent = "再試行する";
                }
            });

            // 距離を計算する便利関数
            function getDist(p1, p2) {
                return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            }

            function onResults(results) {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lms = results.multiFaceLandmarks[0];
                    
                    // --- 1. 顔の角度（3Dパララックス用） ---
                    // 首の傾き (Roll)
                    const dx = lms[263].x - lms[33].x;
                    const dy = lms[263].y - lms[33].y;
                    const roll = -Math.atan2(dy, dx) * (180 / Math.PI);

                    // 顔の左右上下の向き (Yaw, Pitch)
                    const faceW = getDist(lms[234], lms[454]);
                    const faceH = getDist(lms[10], lms[152]);
                    const midX = (lms[234].x + lms[454].x) / 2;
                    const midY = (lms[10].y + lms[152].y) / 2;
                    
                    // 中央から鼻がどれくらいズレているかで算出 (-1.0 ～ 1.0)
                    const yaw = (lms[4].x - midX) / faceW;
                    const pitch = (lms[4].y - midY) / faceH - 0.1;

                    // 顔全体を傾ける
                    headGroup.style.transform = `rotate(${roll}deg)`;

                    // 【パララックス(視差)効果】レイヤーごとに移動量を変えて立体感を出す！
                    // 奥に行くほど逆に動き、手前に来るほど大きく動く
                    layerBack.style.transform = `translate(${yaw * -15}px, ${pitch * -15}px)`;
                    layerMid.style.transform = `translate(${yaw * 10}px, ${pitch * 10}px)`;
                    layerFront.style.transform = `translate(${yaw * 35}px, ${pitch * 35}px)`;
                    layerTop.style.transform = `translate(${yaw * 50}px, ${pitch * 50}px)`;


                    // --- 2. 目の開閉（まぶたの制御） ---
                    const eyeOpenL = getDist(lms[159], lms[145]) / getDist(lms[33], lms[133]);
                    const eyeOpenR = getDist(lms[386], lms[374]) / getDist(lms[263], lms[362]);
                    
                    // まばたきの閾値計算 (0で完全閉じ、1で開き)
                    const blinkL = Math.max(0, Math.min(1, (eyeOpenL - 0.15) * 5));
                    const blinkR = Math.max(0, Math.min(1, (eyeOpenR - 0.15) * 5));

                    // まぶたのパスを動的に変形（Y座標を下げて目を隠す）
                    const lidLY = -15 + (1 - blinkL) * 30; // 閉じるとYがプラスに下がる
                    const lidRY = -15 + (1 - blinkR) * 30;
                    eyelidL.setAttribute("d", `M -95 -15 Q -60 -60 -25 -15 L -25 ${lidLY} Q -60 ${lidLY} -95 ${lidLY} Z`);
                    eyelidR.setAttribute("d", `M 25 -15 Q 60 -60 95 -15 L 95 ${lidRY} Q 60 ${lidRY} 25 ${lidRY} Z`);


                    // --- 3. 瞳の追従（視線） ---
                    // 顔の向き(yaw/pitch)に合わせて瞳孔とハイライトを動かす
                    const pupilX = yaw * 18;
                    const pupilY = pitch * 15;
                    pupilL.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
                    highL.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
                    pupilR.style.transform = `translate(${pupilX}px, ${pupilY}px)`;
                    highR.style.transform = `translate(${pupilX}px, ${pupilY}px)`;


                    // --- 4. 眉毛の動き ---
                    // 目と眉毛の距離から、怒り/驚きの表情を作る
                    const browElevL = (lms[159].y - lms[105].y) / faceH;
                    const browElevR = (lms[386].y - lms[334].y) / faceH;
                    
                    const bY_L = (0.13 - browElevL) * 200; // 上下
                    const bY_R = (0.13 - browElevR) * 200;
                    // 眉毛の角度（内側が上がるか下がるか）
                    const bRotL = (0.13 - browElevL) * 100;
                    const bRotR = -(0.13 - browElevR) * 100;

                    browL.style.transform = `translateY(${bY_L}px) rotate(${bRotL}deg)`;
                    browR.style.transform = `translateY(${bY_R}px) rotate(${bRotR}deg)`;


                    // --- 5. 口の動き（笑顔と開閉） ---
                    const mouthOpen = getDist(lms[13], lms[14]) / faceH; // 縦の開き
                    const mouthSmile = getDist(lms[61], lms[291]) / faceW; // 横の広がり

                    // 基準値からの変化量を計算
                    const openM = Math.min(1, Math.max(0, mouthOpen * 8)); // 0(閉) ～ 1(大開)
                    const smileM = Math.min(1, Math.max(0, (mouthSmile - 0.35) * 5)); // 0(無表情) ～ 1(笑顔)

                    // パス(SVG)を再構築して口の形を自在に操る
                    const mWidth = 20 + smileM * 15 - openM * 5; // 笑うと横に広がる、開くと少し縮む
                    const mTop = 75 - smileM * 5 - openM * 2;   // 笑うと口角が上がる
                    const mBottom = 75 + openM * 35;            // 開くと下唇が下がる
                    const mCornerY = 75 - smileM * 10;          // 口角のY座標

                    mouth.setAttribute("d", `M ${-mWidth} ${mCornerY} Q 0 ${mTop} ${mWidth} ${mCornerY} Q 0 ${mBottom} ${-mWidth} ${mCornerY} Z`);
                }
            }
        };
    </script>
</body>
</html>
