<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My VTuber Engine - Audio Lip Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a24; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        
        #character-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
        }

        #avatar-wrapper {
            position: relative; width: 100%; max-width: 800px; aspect-ratio: 1 / 1; 
        }

        .layer {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            transition: transform 0.05s ease-out;
            will-change: transform, opacity;
        }

        #layer-hair-back { z-index: 1; }
        #layer-neck { z-index: 2; transform-origin: center 90%; }
        #layer-body { z-index: 3; }
        
        #head-group {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 4; transition: transform 0.05s ease-out; transform-origin: center 60%;
        }

        #layer-face { z-index: 5; }
        #layer-nose { z-index: 6; }
        
        .part-eye, .part-mouth, .part-brow {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            will-change: transform, opacity;
        }

        .part-eye { z-index: 7; transform-origin: center 35%; } 
        .part-mouth { z-index: 7; transform-origin: center 44%; } 
        .part-brow { z-index: 7; }
        
        #layer-hair-front { z-index: 10; }

        #controls { position: absolute; bottom: 30px; text-align: center; z-index: 999; }
        .btn { padding: 15px 40px; background: #ff007f; color: #fff; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); transition: 0.1s;}
        .btn:active { transform: scale(0.95); }
        #webcam { position: absolute; top: 20px; right: 20px; width: 100px; height: 130px; border-radius: 8px; transform: scaleX(-1); opacity: 0.3; z-index: 999; pointer-events: none;}
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <div id="character-container">
        <div id="avatar-wrapper">
            <img id="layer-hair-back" class="layer" src="hair_back.png">
            <img id="layer-neck" class="layer" src="neck.png">
            <img id="layer-body" class="layer" src="body.png">
            
            <div id="head-group">
                <img id="layer-face" class="layer" src="face.png">
                <img id="layer-nose" class="layer" src="nose.png">
                
                <img id="eye_l_open" class="part-eye" src="eye_l_open.png">
                <img id="eye_l_close" class="part-eye" src="eye_l_close.png" style="opacity: 0;">
                
                <img id="eye_r_open" class="part-eye" src="eye_r_open.png">
                <img id="eye_r_close" class="part-eye" src="eye_r_close.png" style="opacity: 0;">
                
                <img id="eye_l_brow" class="part-brow" src="eye_l_brow.png">
                <img id="eye_r_brow" class="part-brow" src="eye_r_brow.png">

                <img id="mouth_close" class="part-mouth" src="mouth_close.png">
                <img id="mouth_open" class="part-mouth" src="mouth_open.png" style="opacity: 0;">

                <img id="layer-hair-front" class="layer" src="hair_front.png">
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="start-btn" class="btn">カメラとマイクをオンにして開始</button>
        <p id="status" style="margin-top:10px; font-weight: bold; color: #aaa;">※ブラウザの許可ダイアログが出たらOKを押してください</p>
    </div>

    <script>
        window.onload = () => {
            const startBtn = document.getElementById("start-btn");
            const statusText = document.getElementById("status");
            const video = document.getElementById("webcam");
            
            const headGroup = document.getElementById("head-group");
            const hairBack = document.getElementById("layer-hair-back");
            const neck = document.getElementById("layer-neck");
            const body = document.getElementById("layer-body");
            const face = document.getElementById("layer-face");
            const nose = document.getElementById("layer-nose");
            const hairFront = document.getElementById("layer-hair-front");
            
            const eyeLOpen = document.getElementById("eye_l_open"); const eyeLClose = document.getElementById("eye_l_close");
            const eyeROpen = document.getElementById("eye_r_open"); const eyeRClose = document.getElementById("eye_r_close");
            const browL = document.getElementById("eye_l_brow"); const browR = document.getElementById("eye_r_brow");
            const mouthClose = document.getElementById("mouth_close"); const mouthOpen = document.getElementById("mouth_open");

            let sYaw = 0, sPitch = 0, sRoll = 0;
            let sEarL = 0.15, sEarR = 0.15, sJaw = 0;
            let sMouthW = 0.22; // 口の横幅の初期値

            let isEyeLOpen = true; let isEyeROpen = true;
            let currentScaleL = 1.0; let currentScaleR = 1.0;
            
            let currentScaleMouth = 0.0; // 縦の開き（あ・口の開閉）
            let currentScaleXMouth = 1.0; // 横の開き（い・お・う）
            
            let audioVolume = 0;

            startBtn.addEventListener("click", async () => {
                startBtn.disabled = true; statusText.textContent = "マイクとカメラを準備中...";
                try {
                    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    const source = audioContext.createMediaStreamSource(audioStream);
                    source.connect(analyser);
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);

                    function updateVolume() {
                        requestAnimationFrame(updateVolume);
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        audioVolume = sum / dataArray.length;
                    }
                    updateVolume();

                    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                    faceMesh.onResults(onResults);
                    
                    const camera = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); }, width: 480, height: 640 });
                    await camera.start();
                    video.style.display = "block"; startBtn.style.display = "none"; statusText.textContent = "稼働中 (母音トラッキング実装)";
                } catch (error) {
                    statusText.textContent = "エラー：カメラかマイクが許可されていません";
                }
            });

            function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

            function onResults(results) {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lms = results.multiFaceLandmarks[0];
                    const faceW = getDist(lms[234], lms[454]);
                    const faceH = getDist(lms[10], lms[152]);
                    const midX = (lms[234].x + lms[454].x) / 2;
                    const midY = (lms[10].y + lms[152].y) / 2;
                    
                    const smoothFactor = 0.4;
                    sYaw += (((lms[4].x - midX) / faceW) - sYaw) * smoothFactor;
                    sPitch += (((lms[4].y - midY) / faceH - 0.1) - sPitch) * smoothFactor;
                    sRoll += ((-Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x) * (180 / Math.PI)) - sRoll) * smoothFactor;

                    headGroup.style.transform = `rotate(${sRoll}deg) translate(${sYaw * 15}px, ${sPitch * 15}px)`;
                    neck.style.transform = `rotate(${sRoll * 0.15}deg) translate(${sYaw * 6}px, ${sPitch * 6}px)`;
                    body.style.transform = `rotate(${sRoll * 0.05}deg) translate(${sYaw * 2}px, ${sPitch * 2}px)`;
                    
                    hairBack.style.transform = `translate(${sYaw * -20}px, ${sPitch * -10}px)`;
                    face.style.transform = `translate(${sYaw * 5}px, ${sPitch * 5}px)`;
                    nose.style.transform = `translate(${sYaw * 25}px, ${sPitch * 20}px)`;
                    hairFront.style.transform = `translate(${sYaw * 40}px, ${sPitch * 25}px)`;

                    const partsXY = `translate(${sYaw * 15}px, ${sPitch * 15}px)`;
                    const animSpeed = 0.5;
                    
                    // --- 目の処理 ---
                    sEarL += ((getDist(lms[159], lms[145]) / getDist(lms[133], lms[33])) - sEarL) * smoothFactor;
                    sEarR += ((getDist(lms[386], lms[374]) / getDist(lms[362], lms[263])) - sEarR) * smoothFactor;
                    const syncEar = (sEarL + sEarR) / 2;

                    if (isEyeLOpen && syncEar < 0.09) isEyeLOpen = false;       
                    else if (!isEyeLOpen && syncEar > 0.11) isEyeLOpen = true;  
                    currentScaleL += ((isEyeLOpen ? 1.0 : 0.0) - currentScaleL) * animSpeed;
                    const angleL = -5;
                    if (currentScaleL <= 0.05) { eyeLOpen.style.opacity = 0; eyeLClose.style.opacity = 1; eyeLClose.style.transform = partsXY; } 
                    else { eyeLOpen.style.opacity = 1; eyeLClose.style.opacity = 0; eyeLOpen.style.transform = `${partsXY} rotate(${angleL}deg) scaleY(${currentScaleL}) rotate(${-angleL}deg)`; }

                    if (isEyeROpen && syncEar < 0.09) isEyeROpen = false;
                    else if (!isEyeROpen && syncEar > 0.11) isEyeROpen = true;
                    currentScaleR += ((isEyeROpen ? 1.0 : 0.0) - currentScaleR) * animSpeed;
                    if (currentScaleR <= 0.05) { eyeROpen.style.opacity = 0; eyeRClose.style.opacity = 1; eyeRClose.style.transform = partsXY; } 
                    else { eyeROpen.style.opacity = 1; eyeRClose.style.opacity = 0; eyeROpen.style.transform = `${partsXY} scaleY(${currentScaleR})`; }

                    // =====================================
                    // 1. 口の横幅（い・お）の過剰トラッキング
                    // =====================================
                    sMouthW += ((getDist(lms[61], lms[291]) / faceW) - sMouthW) * smoothFactor;
                    
                    let targetScaleXMouth = 1.0;
                    
                    // 【お・う 行の過剰キャッチ】
                    // 以前(0.19)より判定を甘くし(0.195)、少しでもすぼめたら即座に反応させます。
                    // 変形量は 0.8 から「0.45（本来の横幅の半分以下）」という極端なタコ口に潰します。
                    if (sMouthW < 0.195) {
                        targetScaleXMouth = 0.45; 
                    } 
                    // 【い・え 行の過剰キャッチ】
                    // 少し口角を横に引いただけで反応させます。
                    // 変形量は 1.15 から「1.35（本来の1.35倍）」まで大きく引き伸ばします。
                    else if (sMouthW > 0.225) {
                        targetScaleXMouth = 1.35;
                    }

                    // 横幅の変形スピードも、縦幅の俊敏さに負けないように爆速（0.4 → 0.75）にアップ
                    currentScaleXMouth += (targetScaleXMouth - currentScaleXMouth) * 0.75;

                    // 2. 音量のカーブ化（開きっぱなし防止）
                    // 以前はリニア（直線）でしたが、今回は2乗（カーブ）にしました。
                    // 中くらいの音量では少ししか開かず、声のピーク時にだけパクッと開くため、メリハリが出ます。
                    let audioBase = Math.max(0, (audioVolume - 10) / 30); 
                    let audioTarget = Math.max(0, Math.min(1.0, audioBase * audioBase));

                    // 3. カメラの縦の開き
                    sJaw += ((getDist(lms[13], lms[14]) / faceH) - sJaw) * smoothFactor;
                    let camTarget = Math.max(0, Math.min(1.0, (sJaw - 0.003) / 0.035));

                    // 4. ハイブリッド（カメラの動きを少し強めに評価する）
                    let targetScaleMouth = Math.max(audioTarget, camTarget);

                    // 5. 子音ブロッカー（ん・ま・ぱ行）
                    if (sJaw < 0.012) { 
                        targetScaleMouth = camTarget;
                    }

                    if (targetScaleMouth < 0.05) targetScaleMouth = 0.0; 


                    // 【修正】開閉アニメーション（超・俊敏仕様に変更！）
                    if (targetScaleMouth > currentScaleMouth) {
                        // 開く速度：ほぼ瞬時（0.6 → 0.85 にアップ）
                        currentScaleMouth += (targetScaleMouth - currentScaleMouth) * 0.85; 
                    } else {
                        // 閉じる速度：ラグを無くし瞬時に閉じる（0.15 → 0.8 に大幅アップ）
                        currentScaleMouth += (targetScaleMouth - currentScaleMouth) * 0.8; 
                    }
                    
                    // 適用（scale の引数に 横幅と縦幅 を両方入れる）
                    if (currentScaleMouth <= 0.02) {
                        mouthOpen.style.opacity = 0; mouthClose.style.opacity = 1;
                        mouthClose.style.transform = partsXY; 
                    } else {
                        mouthOpen.style.opacity = 1; mouthClose.style.opacity = 0;
                        mouthOpen.style.transform = `${partsXY} scale(${currentScaleXMouth}, ${currentScaleMouth})`;
                    }

                    // --- 眉毛 ---
                    const browElev = (lms[159].y - lms[105].y) / faceH;
                    const bY = (0.13 - browElev) * 200;
                    browL.style.transform = `translate(${sYaw * 15}px, ${sPitch * 15 + bY}px)`;
                    browR.style.transform = `translate(${sYaw * 15}px, ${sPitch * 15 + bY}px)`;
                }
            }
        };
    </script>
</body>
</html>
