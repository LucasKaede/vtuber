<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-Based VTuber Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a24; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        
        /* キャラクターをまとめるコンテナ */
        #character-container {
            position: relative;
            width: 500px;
            height: 700px;
            /* パーツがはみ出しても大丈夫なように調整 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 全ての画像レイヤーの基本設定 */
        .layer {
            position: absolute;
            transition: transform 0.1s ease-out; /* 滑らかな追従 */
            will-change: transform;
            /* 画像がない場合のプレースホルダー（実際の画像が読み込まれれば上書きされます） */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 各パーツのサイズと重ね順（Z-index）の設定 */
        #layer-back-hair { width: 350px; height: 350px; z-index: 1; top: 50px; }
        #layer-body { width: 400px; height: 400px; z-index: 2; bottom: 0; }
        
        #head-group {
            position: absolute;
            width: 300px; height: 300px;
            z-index: 3;
            top: 100px;
            transition: transform 0.1s ease-out;
        }

        #layer-face { width: 100%; height: 100%; z-index: 4; }
        
        /* 目や口の位置は、ご自身の画像に合わせて top / left を調整してください */
        #layer-eye-l { width: 80px; height: 80px; z-index: 5; top: 120px; left: 40px; }
        #layer-eye-r { width: 80px; height: 80px; z-index: 5; top: 120px; right: 40px; }
        #layer-mouth { width: 60px; height: 40px; z-index: 5; top: 210px; left: 120px; }
        
        #layer-front-hair { width: 350px; height: 300px; z-index: 6; top: -20px; left: -25px; }

        /* UI設定 */
        #controls { position: absolute; bottom: 20px; text-align: center; z-index: 999; }
        .btn { padding: 15px 40px; background: #00d4ff; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 100px; height: 130px; border-radius: 8px; transform: scaleX(-1); opacity: 0.3; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <!-- 画像を重ねるエリア -->
    <div id="character-container">
        <!-- 背景髪 -->
        <img id="layer-back-hair" class="layer" src="back_hair.png" alt="後髪">
        <!-- 体 -->
        <img id="layer-body" class="layer" src="body.png" alt="体">
        
        <!-- 頭部（このグループごと回転・移動する） -->
        <div id="head-group">
            <img id="layer-face" class="layer" src="face.png" alt="顔ベース">
            <img id="layer-eye-l" class="layer" src="eye_l.png" alt="左目">
            <img id="layer-eye-r" class="layer" src="eye_r.png" alt="右目">
            <img id="layer-mouth" class="layer" src="mouth.png" alt="口">
            <img id="layer-front-hair" class="layer" src="front_hair.png" alt="前髪">
        </div>
    </div>

    <div id="controls">
        <button id="start-btn" class="btn">画像モデルを動かす</button>
        <p id="status" style="margin-top:10px;">待機中</p>
    </div>

    <script>
        window.onload = () => {
            const startBtn = document.getElementById("start-btn");
            const statusText = document.getElementById("status");
            const video = document.getElementById("webcam");
            
            // 各画像レイヤーの取得
            const headGroup = document.getElementById("head-group");
            const backHair = document.getElementById("layer-back-hair");
            const face = document.getElementById("layer-face");
            const eyeL = document.getElementById("layer-eye-l");
            const eyeR = document.getElementById("layer-eye-r");
            const mouth = document.getElementById("layer-mouth");
            const frontHair = document.getElementById("layer-front-hair");

            startBtn.addEventListener("click", async () => {
                startBtn.disabled = true; statusText.textContent = "AI起動中...";
                try {
                    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                    faceMesh.onResults(onResults);

                    const camera = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); }, width: 480, height: 640 });
                    await camera.start();
                    video.style.display = "block";
                    startBtn.style.display = "none";
                    statusText.textContent = "トラッキング中";
                } catch (error) {
                    statusText.textContent = "カメラエラー";
                }
            });

            function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

            function onResults(results) {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lms = results.multiFaceLandmarks[0];
                    
                    // 顔の向き計算
                    const faceW = getDist(lms[234], lms[454]);
                    const faceH = getDist(lms[10], lms[152]);
                    const midX = (lms[234].x + lms[454].x) / 2;
                    const midY = (lms[10].y + lms[152].y) / 2;
                    
                    const yaw = (lms[4].x - midX) / faceW;
                    const pitch = (lms[4].y - midY) / faceH - 0.1;
                    const roll = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x) * (180 / Math.PI);

                    // 1. パララックス（視差）効果の適用
                    // 顔全体を傾ける
                    headGroup.style.transform = `rotate(${roll}deg) translate(${yaw * 10}px, ${pitch * 10}px)`;
                    
                    // 奥にある後ろ髪は逆方向に動く
                    backHair.style.transform = `translate(${yaw * -15}px, ${pitch * -10}px)`;
                    
                    // 手前にある前髪は大きく動く（立体感が出る）
                    frontHair.style.transform = `translate(${yaw * 30}px, ${pitch * 20}px)`;
                    
                    // 目と口も顔の向きに合わせて少しスライド
                    eyeL.style.transform = `translate(${yaw * 15}px, ${pitch * 15}px)`;
                    eyeR.style.transform = `translate(${yaw * 15}px, ${pitch * 15}px)`;
                    mouth.style.transform = `translate(${yaw * 18}px, ${pitch * 18}px)`;

                    // 2. まばたき（画像のY軸を潰すことで再現）
                    const earL = getDist(lms[159], lms[145]) / getDist(lms[133], lms[33]);
                    const earR = getDist(lms[386], lms[374]) / getDist(lms[362], lms[263]);
                    const openL = Math.max(0.1, Math.min(1, (earL - 0.12) / 0.14));
                    const openR = Math.max(0.1, Math.min(1, (earR - 0.12) / 0.14));
                    
                    // translate と scale を結合して適用
                    eyeL.style.transform = `translate(${yaw * 15}px, ${pitch * 15}px) scaleY(${openL})`;
                    eyeR.style.transform = `translate(${yaw * 15}px, ${pitch * 15}px) scaleY(${openR})`;

                    // 3. 口の開閉（画像のY軸スケールで再現）
                    const jawDrop = Math.max(0, (getDist(lms[13], lms[14]) / faceH - 0.02) * 5);
                    const mouthOpen = 1 + jawDrop * 2; // 閉じてる時は1、開くと縦に伸びる
                    
                    mouth.style.transform = `translate(${yaw * 18}px, ${pitch * 18}px) scaleY(${mouthOpen})`;
                }
            }
        };
    </script>
</body>
</html>
