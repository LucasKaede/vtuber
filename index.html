<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web 2.5D Anime Avatar - Male Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        /* クールなサイバー空間風の背景 */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
        
        #character-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        /* 動きを滑らかにするトランジション（指先は高速に追従させるため短め） */
        svg#character { width: 100%; height: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4)); }
        .layer { transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1); }
        .hand-layer { transition: transform 0.05s ease-out, opacity 0.2s; }
        .part { transition: all 0.08s ease-out; }

        #controls { position: absolute; bottom: 30px; width: 100%; max-width: 400px; text-align: center; z-index: 999; }
        .btn { display: inline-block; width: 90%; padding: 16px; background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc; border-radius: 4px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); cursor: pointer; backdrop-filter: blur(5px); text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { background: rgba(0, 255, 204, 0.3); transform: scale(0.98); }
        #status { margin-top: 10px; font-size: 0.95rem; color: #aaa; font-family: monospace; }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 80px; height: 100px; object-fit: cover; border: 2px solid #00ffcc; border-radius: 8px; transform: scaleX(-1); z-index: 5; display: none; opacity: 0.7; }
    </style>
    
    <!-- 全身解析を行う最上位AIモデル「Holistic」を読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <div id="character-container">
        <!-- 画面全体をカバーする広いキャンバス -->
        <svg id="character" viewBox="-400 -300 800 800">
            <defs>
                <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FFF0E5" />
                    <stop offset="100%" stop-color="#E5C7B3" />
                </linearGradient>
                <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#1A1C29" />
                    <stop offset="100%" stop-color="#2D324D" />
                </linearGradient>
                <linearGradient id="clothesGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#2C3E50" />
                    <stop offset="100%" stop-color="#111820" />
                </linearGradient>
            </defs>

            <!-- 【胴体レイヤー】肩の傾きに連動 -->
            <g id="body-group" class="layer">
                <!-- 首（男性らしく少し太め） -->
                <path d="M -30 130 L -35 180 L 35 180 L 30 130 Z" fill="url(#skinGrad)" />
                <!-- 首元の影 -->
                <path d="M -30 130 Q 0 160 30 130 Z" fill="#D6B4A1" />
                
                <!-- ジャケット（肩幅を広く、逆三角形に） -->
                <path d="M -50 160 L -220 280 L -220 500 L 220 500 L 220 280 L 50 160 Z" fill="url(#clothesGrad)" stroke="#1A252F" stroke-width="4" />
                <!-- インナーシャツ -->
                <path d="M -35 180 L 0 250 L 35 180 Z" fill="#EAECEE" />
                <!-- 高めの襟（ハイカラー） -->
                <path d="M -50 160 L -80 120 L -30 170 Z" fill="#1A252F" />
                <path d="M 50 160 L 80 120 L 30 170 Z" fill="#1A252F" />
            </g>

            <!-- 【頭部グループ】パララックス（視差）効果適用 -->
            <g id="head-group" class="layer">
                
                <!-- 【奥】後ろ髪 -->
                <g id="layer-back" class="layer">
                    <circle cx="0" cy="10" r="130" fill="url(#hairGrad)" />
                    <!-- 男性らしい尖った毛先 -->
                    <path d="M -130 10 L -160 80 L -110 50 Z" fill="url(#hairGrad)" />
                    <path d="M 130 10 L 160 80 L 110 50 Z" fill="url(#hairGrad)" />
                    <!-- 耳 -->
                    <circle cx="-120" cy="30" r="22" fill="#E5C7B3" stroke="#C59F89" stroke-width="2" />
                    <circle cx="120" cy="30" r="22" fill="#E5C7B3" stroke="#C59F89" stroke-width="2" />
                </g>

                <!-- 【中間】顔のベース（男性的なシャープなアゴライン） -->
                <g id="layer-mid" class="layer">
                    <!-- 輪郭（シュッとした形） -->
                    <path d="M -115 -20 C -115 70, -60 155, 0 165 C 60 155, 115 70, 115 -20 Z" fill="url(#skinGrad)" />
                </g>

                <!-- 【手前】顔のパーツ -->
                <g id="layer-front" class="layer">
                    <!-- 眉毛（キリッとした直線的デザイン） -->
                    <path id="brow-L" class="part" d="M -90 -45 L -30 -35" fill="none" stroke="#1A1C29" stroke-width="8" stroke-linecap="round" />
                    <path id="brow-R" class="part" d="M 30 -35 L 90 -45" fill="none" stroke="#1A1C29" stroke-width="8" stroke-linecap="round" />

                    <!-- 左目（鋭い三白眼風） -->
                    <g id="eye-L-group" class="part">
                        <path d="M -85 -5 Q -55 -25 -25 -5 Q -55 5 -85 -5 Z" fill="#FFF" />
                        <circle id="pupil-L" class="part" cx="-55" cy="-8" r="10" fill="#00E5FF" />
                        <!-- 上まぶた（まばたきで下がる） -->
                        <path id="eyelid-L" class="part" d="M -95 -20 Q -55 -30 -15 -20 L -15 -5 Q -55 -25 -95 -5 Z" fill="#1A1C29" />
                    </g>

                    <!-- 右目 -->
                    <g id="eye-R-group" class="part">
                        <path d="M 25 -5 Q 55 -25 85 -5 Q 55 5 25 -5 Z" fill="#FFF" />
                        <circle id="pupil-R" class="part" cx="55" cy="-8" r="10" fill="#00E5FF" />
                        <!-- 上まぶた -->
                        <path id="eyelid-R" class="part" d="M 15 -20 Q 55 -30 95 -20 L 95 -5 Q 55 -25 15 -5 Z" fill="#1A1C29" />
                    </g>

                    <!-- 鼻（シュッとした影） -->
                    <path id="nose" class="part" d="M 0 35 L -8 60 L 0 65 Z" fill="#C59F89" />

                    <!-- 口（デフォルトはクールなへの字） -->
                    <path id="mouth" class="part" d="M -25 100 Q 0 95 25 100 Q 0 105 -25 100 Z" fill="#A46E65" stroke="#7A4E46" stroke-width="2" stroke-linejoin="round" />
                </g>

                <!-- 【最前面】前髪（鋭く目を覆うようなスタイル） -->
                <g id="layer-top" class="layer">
                    <path d="M -120 -20 C -120 -150, 120 -150, 120 -20 C 80 -40, 50 10, 20 -40 C 0 10, -30 -30, -60 -10 C -90 -40, -110 -10, -120 -20 Z" fill="url(#hairGrad)" />
                    <!-- 垂れる前髪 -->
                    <path d="M -40 -30 L 0 40 L 10 -20 Z" fill="url(#hairGrad)" />
                </g>
            </g>

            <!-- 【手指レイヤー】AIが指の関節を計算してここに線と円を描画する -->
            <g id="hands-group">
                <g id="hand-left" class="hand-layer" opacity="0">
                    <path id="fingers-L" fill="none" stroke="url(#skinGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
                </g>
                <g id="hand-right" class="hand-layer" opacity="0">
                    <path id="fingers-R" fill="none" stroke="url(#skinGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
                </g>
            </g>
        </svg>
    </div>

    <div id="controls">
        <button id="start-btn" class="btn">Link System (543 Params)</button>
        <p id="status">AI: Holistic Model Offline</p>
    </div>

    <script>
        window.onload = () => {
            const startBtn = document.getElementById("start-btn");
            const statusText = document.getElementById("status");
            const videoElement = document.getElementById("webcam");
            
            // SVGパーツ
            const headGroup = document.getElementById("head-group");
            const bodyGroup = document.getElementById("body-group");
            const layerBack = document.getElementById("layer-back");
            const layerMid = document.getElementById("layer-mid");
            const layerFront = document.getElementById("layer-front");
            const layerTop = document.getElementById("layer-top");
            
            const eyelidL = document.getElementById("eyelid-L");
            const eyelidR = document.getElementById("eyelid-R");
            const pupilL = document.getElementById("pupil-L");
            const pupilR = document.getElementById("pupil-R");
            const mouth = document.getElementById("mouth");
            const browL = document.getElementById("brow-L");
            const browR = document.getElementById("brow-R");

            // 手の描画用パーツ
            const handLeftGroup = document.getElementById("hand-left");
            const handRightGroup = document.getElementById("hand-right");
            const fingersL = document.getElementById("fingers-L");
            const fingersR = document.getElementById("fingers-R");

            let camera;

            // --- AI（Holistic）の起動 ---
            startBtn.addEventListener("click", async () => {
                startBtn.disabled = true;
                startBtn.textContent = "Booting...";
                statusText.textContent = "Loading Holistic Parameters (Face/Pose/Hands)...";

                try {
                    // 全身・手・顔を同時解析する最強モデル
                    const holistic = new Holistic({locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
                    }});
                    
                    holistic.setOptions({
                        modelComplexity: 1, // 処理速度と精度のバランス
                        smoothLandmarks: true,
                        refineFaceLandmarks: true,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
                    
                    holistic.onResults(onResults);

                    camera = new Camera(videoElement, {
                        onFrame: async () => { await holistic.send({image: videoElement}); },
                        width: 480, height: 640
                    });
                    
                    await camera.start();
                    videoElement.style.display = "block";
                    startBtn.style.display = "none";
                    statusText.textContent = "System Linked. Sync Rate 100%";

                } catch (error) {
                    statusText.textContent = "Error: Camera access denied.";
                    startBtn.disabled = false;
                }
            });

            // 便利関数：距離計算
            function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
            // EAR (Eye Aspect Ratio) 計算
            function getEAR(lms, top, bottom, left, right) {
                return getDist(lms[top], lms[bottom]) / getDist(lms[left], lms[right]);
            }

            // --- 指の関節データ（21点）をアニメの手に変換する関数 ---
            function drawHandPath(landmarks, nose) {
                if (!landmarks) return "";
                const scale = 1100; // 手の移動スケール
                
                // カメラは反転しているので、X座標を反転させて画面中央(0,0)からの相対座標にする
                const pts = landmarks.map(p => ({
                    x: -(p.x - nose.x) * scale,
                    y: (p.y - nose.y) * scale
                }));

                let d = "";
                // 指のインデックス（親指〜小指）
                const fingers = [
                    [0, 1, 2, 3, 4], // 親指
                    [0, 5, 6, 7, 8], // 人差し指
                    [9, 10, 11, 12], // 中指
                    [13, 14, 15, 16], // 薬指
                    [17, 18, 19, 20]  // 小指
                ];

                // 手のひらのベース
                d += `M ${pts[0].x} ${pts[0].y} L ${pts[5].x} ${pts[5].y} L ${pts[9].x} ${pts[9].y} L ${pts[13].x} ${pts[13].y} L ${pts[17].x} ${pts[17].y} Z `;
                
                // 各指の関節を太い線で結ぶ（これでSVGがアニメの指のように見える）
                fingers.forEach(f => {
                    d += `M ${pts[f[0]].x} ${pts[f[0]].y} `;
                    for(let i=1; i < f.length; i++) {
                        d += `L ${pts[f[i]].x} ${pts[f[i]].y} `;
                    }
                });
                return d;
            }

            // --- AI解析結果のリアルタイム処理 ---
            function onResults(results) {
                // 1. 顔の処理（パララックスと表情）
                if (results.faceLandmarks) {
                    const lms = results.faceLandmarks;
                    
                    const faceW = getDist(lms[234], lms[454]);
                    const faceH = getDist(lms[10], lms[152]);
                    const midX = (lms[234].x + lms[454].x) / 2;
                    const midY = (lms[10].y + lms[152].y) / 2;
                    
                    // 顔の向き計算
                    const yaw = (lms[4].x - midX) / faceW;
                    const pitch = (lms[4].y - midY) / faceH - 0.1;
                    const roll = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x) * (180 / Math.PI);

                    // 頭全体の傾き
                    headGroup.style.transform = `rotate(${roll}deg)`;

                    // パララックス（視差効果）
                    layerBack.style.transform = `translate(${yaw * -15}px, ${pitch * -10}px)`;
                    layerMid.style.transform = `translate(${yaw * 15}px, ${pitch * 15}px)`;
                    layerFront.style.transform = `translate(${yaw * 40}px, ${pitch * 35}px)`;
                    layerTop.style.transform = `translate(${yaw * 60}px, ${pitch * 50}px)`;

                    // まばたき (EAR)
                    const earL = getEAR(lms, 159, 145, 133, 33);
                    const earR = getEAR(lms, 386, 374, 362, 263);
                    const blinkL = Math.max(0, Math.min(1, (earL - 0.13) / 0.12));
                    const blinkR = Math.max(0, Math.min(1, (earR - 0.13) / 0.12));

                    // クールなまぶたの開閉（鋭い角度を保ったまま上下させる）
                    const lidLY = -20 + (1 - blinkL) * 25;
                    const lidRY = -20 + (1 - blinkR) * 25;
                    eyelidL.setAttribute("d", `M -95 -20 Q -55 -30 -15 -20 L -15 ${lidLY} Q -55 ${lidLY - 10} -95 ${lidLY} Z`);
                    eyelidR.setAttribute("d", `M 15 -20 Q 55 -30 95 -20 L 95 ${lidRY} Q 55 ${lidRY - 10} 15 ${lidRY} Z`);

                    // 瞳の追従
                    pupilL.style.transform = `translate(${yaw * 25}px, ${pitch * 20}px)`;
                    pupilR.style.transform = `translate(${yaw * 25}px, ${pitch * 20}px)`;

                    // 口の開閉（クールさを残すため、開きすぎないように調整）
                    const mouthOpen = Math.min(1, Math.max(0, (getDist(lms[13], lms[14]) / faceH - 0.02) * 5));
                    const smile = Math.min(1, Math.max(0, (getDist(lms[61], lms[291]) / faceW - 0.35) * 5));
                    
                    const mTop = 95 - smile * 5 - mouthOpen * 5;
                    const mBot = 105 + mouthOpen * 25;
                    const mCornerY = 100 - smile * 8;
                    const mW = 25 + smile * 10;
                    
                    mouth.setAttribute("d", `M ${-mW} ${mCornerY} Q 0 ${mTop} ${mW} ${mCornerY} Q 0 ${mBot} ${-mW} ${mCornerY} Z`);

                    // 眉毛（驚き・怒り）
                    const browElev = (lms[159].y - lms[105].y) / faceH;
                    const bY = (0.13 - browElev) * 150;
                    browL.style.transform = `translateY(${bY}px)`;
                    browR.style.transform = `translateY(${bY}px)`;
                }

                // 2. 体の姿勢（PoseLandmarks）
                if (results.poseLandmarks) {
                    const pose = results.poseLandmarks;
                    // 肩の座標（11: 左肩, 12: 右肩）
                    const sL = pose[11];
                    const sR = pose[12];
                    
                    // 肩の傾きを計算して、胴体（ジャケット）を連動させる
                    // 映像は反転しているので角度も反転
                    const shoulderAngle = Math.atan2(sR.y - sL.y, sR.x - sL.x) * (180 / Math.PI);
                    // 傾きすぎないように制限をかける
                    const bodyRoll = Math.max(-15, Math.min(15, shoulderAngle));
                    
                    bodyGroup.style.transform = `rotate(${-bodyRoll}deg)`;
                }

                // 3. 手・指のトラッキング（パラメータ大放出ゾーン）
                // カメラ映像ではユーザーの右手が画面左側（leftHand）として認識される
                const nose = results.faceLandmarks ? results.faceLandmarks[1] : {x: 0.5, y: 0.5};

                // 左手（画面左側 / ユーザーの右手）
                if (results.rightHandLandmarks) {
                    handLeftGroup.setAttribute("opacity", "1");
                    fingersL.setAttribute("d", drawHandPath(results.rightHandLandmarks, nose));
                } else {
                    handLeftGroup.setAttribute("opacity", "0");
                }

                // 右手（画面右側 / ユーザーの左手）
                if (results.leftHandLandmarks) {
                    handRightGroup.setAttribute("opacity", "1");
                    fingersR.setAttribute("d", drawHandPath(results.leftHandLandmarks, nose));
                } else {
                    handRightGroup.setAttribute("opacity", "0");
                }
            }
        };
    </script>
</body>
</html>
