<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My VTuber Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a24; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        
        #character-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 
         すべてのパーツは同じキャンバスサイズで出力されている前提なので、
         中央にピッタリ重ねるだけで正しい位置に配置されます。
        */
        .layer {
            position: absolute;
            width: 100%; max-width: 800px; /* 画面に合わせて調整 */
            height: 100%; max-height: 800px;
            object-fit: contain;
            transition: transform 0.1s ease-out;
            will-change: transform, opacity;
        }

        /* 重ね順（Z-index）の指定 */
        #layer-hair-back { z-index: 1; }
        #layer-neck { z-index: 2; }
        #layer-body { z-index: 3; }
        
        /* 頭グループ（顔全体が動く） */
        #head-group {
            position: absolute;
            width: 100%; max-width: 800px;
            height: 100%; max-height: 800px;
            z-index: 4;
            transition: transform 0.1s ease-out;
            transform-origin: center 60%; /* 首の付け根あたりを回転軸に */
        }

        #layer-face { z-index: 5; }
        #layer-nose { z-index: 6; }
        
        /* 表情パーツ（目はデフォルトでopenを表示、closeは非表示） */
        .eye-close, .mouth-open { opacity: 0; } 
        
        .part-eye, .part-mouth, .part-brow { z-index: 7; position: absolute; width: 100%; height: 100%; object-fit: contain; }
        
        #layer-hair-front { z-index: 10; }

        #controls { position: absolute; bottom: 30px; text-align: center; z-index: 999; }
        .btn { padding: 15px 40px; background: #00d4ff; color: #000; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); transition: 0.1s;}
        .btn:active { transform: scale(0.95); }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 100px; height: 130px; border-radius: 8px; transform: scaleX(-1); opacity: 0.3; z-index: 999; pointer-events: none;}
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>

    <!-- キャラクター表示エリア -->
    <div id="character-container">
        <!-- 背景・体 -->
        <img id="layer-hair-back" class="layer" src="hair_back.png">
        <img id="layer-neck" class="layer" src="neck.png">
        <img id="layer-body" class="layer" src="body.png">
        
        <!-- 頭部グループ -->
        <div id="head-group">
            <img id="layer-face" class="layer" src="face.png">
            <img id="layer-nose" class="layer" src="nose.png">
            
            <!-- 左目（開・閉） -->
            <img id="eye_l_open" class="part-eye eye-open" src="eye_l_open.png">
            <img id="eye_l_close" class="part-eye eye-close" src="eye_l_close.png">
            
            <!-- 右目（開・閉） -->
            <img id="eye_r_open" class="part-eye eye-open" src="eye_r_open.png">
            <img id="eye_r_close" class="part-eye eye-close" src="eye_r_close.png">
            
            <!-- 眉毛 -->
            <img id="eye_l_brow" class="part-brow" src="eye_l_brow.png">
            <img id="eye_r_brow" class="part-brow" src="eye_r_brow.png">

            <!-- 口（開・閉） -->
            <img id="mouth_close" class="part-mouth mouth-close" src="mouth_close.png">
            <img id="mouth_open" class="part-mouth mouth-open" src="mouth_open.png">

            <!-- 前髪 -->
            <img id="layer-hair-front" class="layer" src="hair_front.png">
        </div>
    </div>

    <div id="controls">
        <button id="start-btn" class="btn">トラッキング開始</button>
        <p id="status" style="margin-top:10px; font-weight: bold; color: #aaa;">カメラを許可してください</p>
    </div>

    <script>
        window.onload = () => {
            const startBtn = document.getElementById("start-btn");
            const statusText = document.getElementById("status");
            const video = document.getElementById("webcam");
            
            // レイヤー取得
            const headGroup = document.getElementById("head-group");
            const hairBack = document.getElementById("layer-hair-back");
            const face = document.getElementById("layer-face");
            const nose = document.getElementById("layer-nose");
            const hairFront = document.getElementById("layer-hair-front");
            
            // 表情パーツ取得
            const eyeLOpen = document.getElementById("eye_l_open"); const eyeLClose = document.getElementById("eye_l_close");
            const eyeROpen = document.getElementById("eye_r_open"); const eyeRClose = document.getElementById("eye_r_close");
            const browL = document.getElementById("eye_l_brow"); const browR = document.getElementById("eye_r_brow");
            const mouthClose = document.getElementById("mouth_close"); const mouthOpen = document.getElementById("mouth_open");

            startBtn.addEventListener("click", async () => {
                startBtn.disabled = true; statusText.textContent = "AIモデル読み込み中...";
                try {
                    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
                    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                    faceMesh.onResults(onResults);

                    const camera = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); }, width: 480, height: 640 });
                    await camera.start();
                    video.style.display = "block";
                    startBtn.style.display = "none";
                    statusText.textContent = "稼働中 (高画質モード)";
                } catch (error) {
                    statusText.textContent = "カメラエラー";
                }
            });

            function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

            function onResults(results) {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                    const lms = results.multiFaceLandmarks[0];
                    
                    // --- 1. 顔の向き（パララックス用） ---
                    const faceW = getDist(lms[234], lms[454]);
                    const faceH = getDist(lms[10], lms[152]);
                    const midX = (lms[234].x + lms[454].x) / 2;
                    const midY = (lms[10].y + lms[152].y) / 2;
                    
                    const yaw = (lms[4].x - midX) / faceW;
                    const pitch = (lms[4].y - midY) / faceH - 0.1;
                    const roll = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x) * (180 / Math.PI);

                    // 頭全体の回転と移動
                    headGroup.style.transform = `rotate(${roll}deg) translate(${yaw * 15}px, ${pitch * 15}px)`;
                    
                    // パーツごとの奥行き（パララックス）
                    hairBack.style.transform = `translate(${yaw * -20}px, ${pitch * -10}px)`; // 奥
                    face.style.transform = `translate(${yaw * 5}px, ${pitch * 5}px)`; // 基準
                    nose.style.transform = `translate(${yaw * 25}px, ${pitch * 20}px)`; // 少し手前
                    hairFront.style.transform = `translate(${yaw * 40}px, ${pitch * 25}px)`; // 一番手前

                    // 目、口、眉毛のパララックス（顔の向きに合わせる）
                    const partsTransform = `translate(${yaw * 15}px, ${pitch * 15}px)`;
                    eyeLOpen.style.transform = partsTransform; eyeLClose.style.transform = partsTransform;
                    eyeROpen.style.transform = partsTransform; eyeRClose.style.transform = partsTransform;
                    mouthClose.style.transform = partsTransform; mouthOpen.style.transform = partsTransform;

                    // --- 2. まばたき（画像の切り替え） ---
                    const earL = getDist(lms[159], lms[145]) / getDist(lms[133], lms[33]);
                    const earR = getDist(lms[386], lms[374]) / getDist(lms[362], lms[263]);
                    
                    // EAR（目の開き具合）が閾値以下なら「閉じる」
                    if (earL < 0.13) { eyeLOpen.style.opacity = 0; eyeLClose.style.opacity = 1; }
                    else { eyeLOpen.style.opacity = 1; eyeLClose.style.opacity = 0; }
                    
                    if (earR < 0.13) { eyeROpen.style.opacity = 0; eyeRClose.style.opacity = 1; }
                    else { eyeROpen.style.opacity = 1; eyeRClose.style.opacity = 0; }

                    // --- 3. 眉毛の上下 ---
                    const browElev = (lms[159].y - lms[105].y) / faceH;
                    const bY = (0.13 - browElev) * 200; // 眉毛の可動域
                    browL.style.transform = `translate(${yaw * 15}px, ${pitch * 15 + bY}px)`;
                    browR.style.transform = `translate(${yaw * 15}px, ${pitch * 15 + bY}px)`;

                    // --- 4. 口の開閉（画像の切り替え） ---
                    const jawDrop = (getDist(lms[13], lms[14]) / faceH);
                    
                    // 口が一定以上開いたら「mouth_open」に切り替え
                    if (jawDrop > 0.03) { mouthClose.style.opacity = 0; mouthOpen.style.opacity = 1; }
                    else { mouthClose.style.opacity = 1; mouthOpen.style.opacity = 0; }
                }
            }
        };
    </script>
</body>
</html>
