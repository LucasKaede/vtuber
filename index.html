<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live2D レイヤー構造 3D分解図</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a24; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #controls {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; border: 1px solid #00d4ff;
        }
        button {
            padding: 15px 30px; background: #00d4ff; color: #000; border: none;
            border-radius: 5px; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        button:active { transform: scale(0.95); }
        
        #scene {
            perspective: 1500px;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #wrapper {
            width: 600px; height: 600px;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 【展開状態】（アイソメトリックビュー） */
        .state-exploded #wrapper {
            transform: rotateX(60deg) rotateZ(-45deg) translateY(100px);
        }
        /* 【結合状態】（正面ビュー） */
        .state-flat #wrapper {
            transform: rotateX(0deg) rotateZ(0deg) translateY(0px);
        }

        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 展開時のそれぞれの高さ（Z軸） */
        .state-exploded .l7 { transform: translateZ(300px); }
        .state-exploded .l6 { transform: translateZ(200px); }
        .state-exploded .l5 { transform: translateZ(100px); }
        .state-exploded .l4 { transform: translateZ(20px); }
        .state-exploded .l3 { transform: translateZ(-50px); }
        .state-exploded .l2 { transform: translateZ(-150px); }
        .state-exploded .l1 { transform: translateZ(-250px); }

        /* 結合時はすべて同じ高さ（0）に */
        .state-flat .layer { transform: translateZ(0px); }
        
        /* 結合時はSVGに少し影をつけて馴染ませる */
        .state-flat svg { filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

        .tag {
            font-size: 18px; font-weight: bold; fill: #00d4ff;
            opacity: 0; transition: opacity 1s 0.5s;
        }
        /* 展開時のみレイヤー名のテキストを表示する */
        .state-exploded .tag { opacity: 1; }
    </style>
</head>
<body>

    <div id="controls">
        <h3 style="margin-bottom:10px; color:#00d4ff;">レイヤー構造ビューワー</h3>
        <p style="margin-bottom:15px; font-size:0.9rem; color:#aaa;">
            なぜ顔を細かく分けるのか？<br>ボタンを押して立体構造を確認してください。
        </p>
        <button onclick="toggleView()">展開 / 結合 を切り替え</button>
    </div>

    <!-- 初期状態は展開（exploded） -->
    <div id="scene" class="state-exploded">
        <div id="wrapper">
            
            <!-- 1. 後ろ髪 -->
            <div class="layer l1">
                <svg viewBox="0 0 600 600">
                    <circle cx="300" cy="270" r="140" fill="#2c3e50"/>
                    <text class="tag" x="460" y="270">1. hair_back (後ろ髪)</text>
                </svg>
            </div>
            
            <!-- 2. 首と体 -->
            <div class="layer l2">
                <svg viewBox="0 0 600 600">
                    <!-- 顔の裏に隠れる部分（上部）まで長く描くのがポイント -->
                    <path d="M 270 200 L 270 420 L 330 420 L 330 200 Z" fill="#e8c3ad" />
                    <!-- ジャケット -->
                    <path d="M 150 550 L 200 400 L 400 400 L 450 550 Z" fill="#34495e" stroke="#1abc9c" stroke-width="3"/>
                    <text class="tag" x="460" y="350">2. neck & body (長く描いた首)</text>
                </svg>
            </div>
            
            <!-- 3. 顔ベース（のっぺらぼう） -->
            <div class="layer l3">
                <svg viewBox="0 0 600 600">
                    <circle cx="200" cy="310" r="30" fill="#ffedd8" /> <!-- 左耳 -->
                    <circle cx="400" cy="310" r="30" fill="#ffedd8" /> <!-- 右耳 -->
                    <!-- ツルツルの肌 -->
                    <path d="M 210 220 C 210 380, 250 450, 300 460 C 350 450, 390 380, 390 220 Z" fill="#ffedd8" />
                    <text class="tag" x="460" y="310">3. face_base (のっぺらぼう肌＋耳)</text>
                </svg>
            </div>
            
            <!-- 4. 顔の輪郭線 -->
            <div class="layer l4">
                <svg viewBox="0 0 600 600">
                    <!-- アゴのV字ライン。横を向いた時に立体感を出すための最重要パーツ -->
                    <path d="M 210 310 C 210 380, 250 450, 300 460 C 350 450, 390 380, 390 310" fill="none" stroke="#d35400" stroke-width="5" stroke-linecap="round"/>
                    <text class="tag" x="460" y="440">4. face_outline (アゴの輪郭線)</text>
                </svg>
            </div>
            
            <!-- 5. 顔のパーツ（目、口、鼻） -->
            <div class="layer l5">
                <svg viewBox="0 0 600 600">
                    <!-- 左目 -->
                    <path d="M 220 300 Q 250 270 280 300 Q 250 315 220 300 Z" fill="#fff" />
                    <circle cx="250" cy="295" r="12" fill="#00d4ff" />
                    <path d="M 215 295 Q 250 260 285 295" fill="none" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
                    <!-- 右目 -->
                    <path d="M 320 300 Q 350 270 380 300 Q 350 315 320 300 Z" fill="#fff" />
                    <circle cx="350" cy="295" r="12" fill="#00d4ff" />
                    <path d="M 315 295 Q 350 260 385 295" fill="none" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
                    <!-- 口 -->
                    <path d="M 285 400 Q 300 415 315 400" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
                    <!-- 鼻 -->
                    <path d="M 300 340 L 295 360 L 300 365" fill="none" stroke="#d35400" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <text class="tag" x="460" y="300">5. face_parts (目・口・鼻)</text>
                </svg>
            </div>

            <!-- 6. 髪の落ち影 -->
            <div class="layer l6">
                <svg viewBox="0 0 600 600">
                    <!-- 前髪の形に沿った、肌色の上に落ちる半透明の影 -->
                    <path d="M 210 220 Q 260 260 300 230 Q 340 260 390 220 Q 370 320 340 300 Q 300 340 260 300 Z" fill="rgba(0,0,0,0.15)" />
                    <text class="tag" x="460" y="230">6. shadow_hair (髪の落ち影)</text>
                </svg>
            </div>
            
            <!-- 7. 前髪 -->
            <div class="layer l7">
                <svg viewBox="0 0 600 600">
                    <!-- 前髪と横髪 -->
                    <path d="M 180 220 Q 240 250 300 220 Q 360 250 420 220 Q 430 350 380 360 Q 370 290 340 270 Q 300 330 260 270 Q 230 290 220 360 Q 170 350 180 220 Z" fill="#34495e" />
                    <!-- 頭頂部 -->
                    <path d="M 180 220 Q 240 140 300 160 Q 360 140 420 220 Q 300 90 180 220 Z" fill="#34495e" />
                    <text class="tag" x="460" y="150">7. hair_front (前髪・横髪)</text>
                </svg>
            </div>

        </div>
    </div>

    <script>
        function toggleView() {
            const scene = document.getElementById('scene');
            // 状態のトグル
            if (scene.classList.contains('state-exploded')) {
                scene.classList.remove('state-exploded');
                scene.classList.add('state-flat');
            } else {
                scene.classList.remove('state-flat');
                scene.classList.add('state-exploded');
            }
        }
    </script>
</body>
</html>
