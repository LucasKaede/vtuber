<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3D Anime Avatar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        /* アニメ風の明るい背景 */
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fff0f5 0%, #d8eaff 100%); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #character-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; max-width: 400px; text-align: center; z-index: 999; }
        .btn { display: inline-block; width: 90%; padding: 16px; background: #fff; color: #ff6b81; border: 2px solid #ff6b81; border-radius: 50px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 8px 15px rgba(255, 107, 129, 0.2); cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); box-shadow: 0 4px 8px rgba(255, 107, 129, 0.2); }
        #status { margin-top: 10px; font-size: 0.95rem; color: #555; font-weight: bold; }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 80px; height: 100px; object-fit: cover; border-radius: 10px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transform: scaleX(-1); z-index: 5; display: none; }
    </style>
    
    <!-- Mediapipe & Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <div id="character-container"></div>

    <div id="controls">
        <button id="start-btn" class="btn">✨ 3Dアニメアバターを起動 ✨</button>
        <p id="status">システム待機中...</p>
    </div>

    <script>
        // ==========================================
        // 1. ダイナミック2Dキャンバス（完璧な表情を描画するシステム）
        // ==========================================
        // 3Dモデルの顔の表面に貼り付ける「顔の絵」をリアルタイムに描き換えます。
        // これにより、3Dでありながらアニメ特有の「綺麗な口の変形」が可能になります。
        const faceCanvas = document.createElement('canvas');
        faceCanvas.width = 512;
        faceCanvas.height = 512;
        const ctx = faceCanvas.getContext('2d');
        const faceTexture = new THREE.CanvasTexture(faceCanvas);

        function drawAnimeFace(blinkL, blinkR, mouthOpen, smile, gazeX, gazeY) {
            ctx.clearRect(0, 0, 512, 512);

            // --- まゆげ ---
            ctx.strokeStyle = '#8a5a44';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            // 左
            ctx.beginPath(); ctx.moveTo(120, 160); ctx.quadraticCurveTo(170, 140 - smile*15, 220, 160); ctx.stroke();
            // 右
            ctx.beginPath(); ctx.moveTo(292, 160); ctx.quadraticCurveTo(342, 140 - smile*15, 392, 160); ctx.stroke();

            // --- 目（アニメ風の大きな瞳） ---
            const eyeY = 240;
            const eyeColor = '#48dbfb'; // 瞳の色（水色）
            
            // 左目
            ctx.lineWidth = 14;
            ctx.beginPath(); ctx.moveTo(120, eyeY); ctx.quadraticCurveTo(170, eyeY - 45, 220, eyeY + 10); ctx.stroke(); // 上まつげ
            if (blinkL < 0.8) {
                // 開いている時
                ctx.fillStyle = eyeColor;
                ctx.beginPath(); ctx.ellipse(170 + gazeX, eyeY + 25 + gazeY, 30, 45 * (1 - blinkL), 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; // ハイライト
                ctx.beginPath(); ctx.arc(160 + gazeX, eyeY + 10 + gazeY, 12, 0, Math.PI*2); ctx.fill();
            } else {
                // 閉じている時（笑い目）
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(140, eyeY + 30); ctx.quadraticCurveTo(170, eyeY + 45, 200, eyeY + 30); ctx.stroke();
            }

            // 右目
            ctx.lineWidth = 14;
            ctx.beginPath(); ctx.moveTo(292, eyeY + 10); ctx.quadraticCurveTo(342, eyeY - 45, 392, eyeY); ctx.stroke();
            if (blinkR < 0.8) {
                ctx.fillStyle = eyeColor;
                ctx.beginPath(); ctx.ellipse(342 + gazeX, eyeY + 25 + gazeY, 30, 45 * (1 - blinkR), 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(332 + gazeX, eyeY + 10 + gazeY, 12, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(312, eyeY + 30); ctx.quadraticCurveTo(342, eyeY + 45, 372, eyeY + 30); ctx.stroke();
            }

            // --- アニメの口（破綻のない変形） ---
            const mY = 380;
            ctx.fillStyle = '#ff6b81'; // 舌/口の中の色
            ctx.strokeStyle = '#d94c63';
            ctx.lineWidth = 4;
            
            if (mouthOpen > 0.1) {
                // 口を開けている時（アニメ特有のDの字や三角形の口）
                const mWidth = 25 + smile * 20;
                ctx.beginPath();
                ctx.moveTo(256 - mWidth, mY - smile * 10); // 左端
                ctx.quadraticCurveTo(256, mY - 10, 256 + mWidth, mY - smile * 10); // 上唇
                ctx.quadraticCurveTo(256, mY + mouthOpen * 120, 256 - mWidth, mY - smile * 10); // 下唇（アゴに合わせて伸びる）
                ctx.fill(); ctx.stroke();
            } else {
                // 閉じている時（にっこり/通常）
                const mWidth = 20 + smile * 10;
                ctx.beginPath();
                ctx.moveTo(256 - mWidth, mY);
                ctx.quadraticCurveTo(256, mY + smile * 15 + 5, 256 + mWidth, mY);
                ctx.stroke();
            }

            // テクスチャを更新
            faceTexture.needsUpdate = true;
        }

        // 初期顔を描画
        drawAnimeFace(0, 0, 0, 0, 0, 0);


        // ==========================================
        // 2. Three.js による 3Dアニメキャラクター構築
        // ==========================================
        const container = document.getElementById('character-container');
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 5.5;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const headGroup = new THREE.Group();
        scene.add(headGroup);

        // トゥーンシェーディング（アニメ塗り）用マテリアル
        const skinColor = 0xffe6d5;
        const hairColor = 0xffa8c6; // ピンク髪
        const toonMaterial = new THREE.MeshToonMaterial({ color: skinColor });
        const hairMaterial = new THREE.MeshToonMaterial({ color: hairColor });

        // 顔のベース（少し縦長の球体）
        const headGeo = new THREE.SphereGeometry(1.3, 32, 32);
        const headMesh = new THREE.Mesh(headGeo, toonMaterial);
        headMesh.scale.set(1, 1.1, 0.95);
        headGroup.add(headMesh);

        // 顔の表情パネル（顔の前に透明な板を置き、そこにキャンバスの絵を映す）
        // これにより、3Dの立体感と2Dの美しいアニメ表現が両立します！
        const facePlaneGeo = new THREE.PlaneGeometry(2.6, 2.6);
        const facePlaneMat = new THREE.MeshBasicMaterial({ map: faceTexture, transparent: true });
        const facePlane = new THREE.Mesh(facePlaneGeo, facePlaneMat);
        facePlane.position.set(0, -0.1, 1.25); // 顔の少し手前に配置
        headGroup.add(facePlane);

        // 髪の毛（後頭部とアホ毛でアニメらしさを出す）
        const backHairGeo = new THREE.SphereGeometry(1.4, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.65);
        const backHair = new THREE.Mesh(backHairGeo, hairMaterial);
        backHair.position.set(0, 0.1, -0.1);
        headGroup.add(backHair);

        const ahogeGeo = new THREE.TorusGeometry(0.3, 0.05, 8, 20, Math.PI);
        const ahoge = new THREE.Mesh(ahogeGeo, hairMaterial);
        ahoge.position.set(0, 1.4, 0.5);
        ahoge.rotation.set(0, 0, Math.PI / 4);
        headGroup.add(ahoge);

        // ライト（アニメ塗りを綺麗に出すための設定）
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(2, 5, 5);
        scene.add(dirLight);

        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // アニメーション制御用変数
        let target = { rx: 0, ry: 0, rz: 0, bL: 0, bR: 0, mOpen: 0, smile: 0, gX: 0, gY: 0 };
        let current = { rx: 0, ry: 0, rz: 0, bL: 0, bR: 0, mOpen: 0, smile: 0, gX: 0, gY: 0 };

        function animate() {
            requestAnimationFrame(animate);
            // 滑らかに動かす（LERP処理）
            current.rx += (target.rx - current.rx) * 0.15;
            current.ry += (target.ry - current.ry) * 0.15;
            current.rz += (target.rz - current.rz) * 0.15;
            current.bL += (target.bL - current.bL) * 0.3;
            current.bR += (target.bR - current.bR) * 0.3;
            current.mOpen += (target.mOpen - current.mOpen) * 0.3;
            current.smile += (target.smile - current.smile) * 0.2;
            current.gX += (target.gX - current.gX) * 0.3;
            current.gY += (target.gY - current.gY) * 0.3;

            // 3D頭部の回転
            headGroup.rotation.set(current.rx, current.ry, current.rz);
            
            // 2Dキャンバス顔の再描画
            drawAnimeFace(current.bL, current.bR, current.mOpen, current.smile, current.gX, current.gY);

            renderer.render(scene, camera3D);
        }
        animate();


        // ==========================================
        // 3. AI トラッキング（高精度 まばたき対応版）
        // ==========================================
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status");
        const videoElement = document.getElementById("webcam");

        startBtn.addEventListener("click", async () => {
            startBtn.disabled = true;
            statusText.textContent = "AIモデルを読み込み中...";

            try {
                const faceMesh = new FaceMesh({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }});
                
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                faceMesh.onResults(onResults);

                const cameraStream = new Camera(videoElement, {
                    onFrame: async () => { await faceMesh.send({image: videoElement}); },
                    width: 480, height: 640
                });
                
                await cameraStream.start();
                videoElement.style.display = "block";
                startBtn.style.display = "none";
                statusText.textContent = "トラッキング中！";
            } catch (error) {
                statusText.textContent = "エラー：カメラを許可してください。";
                startBtn.disabled = false;
            }
        });

        // EAR (Eye Aspect Ratio) 関数（正確なまばたき判定）
        function getEAR(lms, top, bottom, left, right) {
            const vDist = Math.hypot(lms[top].x - lms[bottom].x, lms[top].y - lms[bottom].y);
            const hDist = Math.hypot(lms[left].x - lms[right].x, lms[left].y - lms[right].y);
            return vDist / hDist;
        }

        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const lms = results.multiFaceLandmarks[0];
                
                const faceW = Math.hypot(lms[234].x - lms[454].x, lms[234].y - lms[454].y);
                const faceH = Math.hypot(lms[10].x - lms[152].x, lms[10].y - lms[152].y);
                const midX = (lms[234].x + lms[454].x) / 2;
                const midY = (lms[10].y + lms[152].y) / 2;
                
                // 1. 3Dの顔の向き
                target.ry = ((lms[4].x - midX) / faceW) * 2.0; 
                target.rx = -((lms[4].y - midY) / faceH - 0.05) * 2.0;
                target.rz = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x);

                // 2. まばたき判定（距離の変化に強いEARを採用）
                const earL = getEAR(lms, 159, 145, 133, 33);
                const earR = getEAR(lms, 386, 374, 362, 263);
                // 0.15以下なら閉じたと判定
                target.bL = 1 - Math.max(0, Math.min(1, (earL - 0.15) / 0.10));
                target.bR = 1 - Math.max(0, Math.min(1, (earR - 0.15) / 0.10));

                // 3. 口の変形（開き具合と笑顔）
                const mouthDist = Math.hypot(lms[13].x - lms[14].x, lms[13].y - lms[14].y);
                target.mOpen = Math.min(1, Math.max(0, (mouthDist / faceH - 0.02) * 6));
                
                const smileDist = Math.hypot(lms[61].x - lms[291].x, lms[61].y - lms[291].y);
                target.smile = Math.min(1, Math.max(0, (smileDist / faceW - 0.35) * 5));

                // 4. 視線（顔の向きに合わせて瞳をずらす）
                target.gX = target.ry * -30;
                target.gY = target.rx * -30;
            }
        }
    </script>
</body>
</html>
