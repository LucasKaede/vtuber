<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3D Anime Avatar - Sculpted</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        #character-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; max-width: 400px; text-align: center; z-index: 999; }
        .btn { display: inline-block; width: 90%; padding: 16px; background: #fff; color: #00acc1; border: 2px solid #00acc1; border-radius: 50px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 8px 15px rgba(0, 172, 193, 0.2); cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); box-shadow: 0 4px 8px rgba(0, 172, 193, 0.2); }
        #status { margin-top: 10px; font-size: 0.95rem; color: #00838f; font-weight: bold; }
        
        #webcam { position: absolute; top: 20px; right: 20px; width: 80px; height: 100px; object-fit: cover; border-radius: 10px; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transform: scaleX(-1); z-index: 5; display: none; }
    </style>
    
    <!-- 安定のスクリプト読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <div id="character-container"></div>

    <div id="controls">
        <button id="start-btn" class="btn">✨ モデルをロードして接続 ✨</button>
        <p id="status">システム待機中...</p>
    </div>

    <script>
        // ==========================================
        // 1. ダイナミック2Dキャンバス（表情の描画）
        // ==========================================
        const faceCanvas = document.createElement('canvas');
        faceCanvas.width = 512; faceCanvas.height = 512;
        const ctx = faceCanvas.getContext('2d');
        const faceTexture = new THREE.CanvasTexture(faceCanvas);
        faceTexture.anisotropy = 4;

        function drawAnimeFace(blinkL, blinkR, mouthOpen, smile, gazeX, gazeY) {
            ctx.clearRect(0, 0, 512, 512); // 背景は完全に透明にする

            // --- まゆげ ---
            ctx.strokeStyle = '#5a3d31';
            ctx.lineWidth = 5; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(130, 170); ctx.quadraticCurveTo(170, 150 - smile*15, 210, 170); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(302, 170); ctx.quadraticCurveTo(342, 150 - smile*15, 382, 170); ctx.stroke();

            // --- 目 ---
            const eyeY = 240;
            const eyeColor = '#b39ddb'; // 瞳の色（紫系）
            
            // 左目
            ctx.lineWidth = 12;
            ctx.beginPath(); ctx.moveTo(130, eyeY); ctx.quadraticCurveTo(170, eyeY - 40, 210, eyeY + 10); ctx.stroke();
            if (blinkL < 0.8) {
                ctx.fillStyle = eyeColor;
                ctx.beginPath(); ctx.ellipse(170 + gazeX, eyeY + 20 + gazeY, 28, 40 * (1 - blinkL), 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(160 + gazeX, eyeY + 5 + gazeY, 10, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(140, eyeY + 25); ctx.quadraticCurveTo(170, eyeY + 40, 200, eyeY + 25); ctx.stroke();
            }

            // 右目
            ctx.lineWidth = 12;
            ctx.beginPath(); ctx.moveTo(302, eyeY + 10); ctx.quadraticCurveTo(342, eyeY - 40, 382, eyeY); ctx.stroke();
            if (blinkR < 0.8) {
                ctx.fillStyle = eyeColor;
                ctx.beginPath(); ctx.ellipse(342 + gazeX, eyeY + 20 + gazeY, 28, 40 * (1 - blinkR), 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(332 + gazeX, eyeY + 5 + gazeY, 10, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(312, eyeY + 25); ctx.quadraticCurveTo(342, eyeY + 40, 372, eyeY + 25); ctx.stroke();
            }

            // --- 鼻（ちょこんとした影） ---
            ctx.fillStyle = '#d7ccc8';
            ctx.beginPath(); ctx.moveTo(256, 310); ctx.lineTo(250, 320); ctx.lineTo(262, 320); ctx.fill();

            // --- 口 ---
            const mY = 380;
            ctx.fillStyle = '#f48fb1'; ctx.strokeStyle = '#c2185b'; ctx.lineWidth = 3;
            
            if (mouthOpen > 0.1) {
                const mWidth = 20 + smile * 15;
                ctx.beginPath();
                ctx.moveTo(256 - mWidth, mY - smile * 8);
                ctx.quadraticCurveTo(256, mY - 5, 256 + mWidth, mY - smile * 8);
                ctx.quadraticCurveTo(256, mY + mouthOpen * 100, 256 - mWidth, mY - smile * 8);
                ctx.fill(); ctx.stroke();
            } else {
                const mWidth = 15 + smile * 10;
                ctx.beginPath();
                ctx.moveTo(256 - mWidth, mY); ctx.quadraticCurveTo(256, mY + smile * 15 + 2, 256 + mWidth, mY); ctx.stroke();
            }
            faceTexture.needsUpdate = true;
        }
        drawAnimeFace(0, 0, 0, 0, 0, 0);

        // ==========================================
        // 2. Three.js による 骨格・髪・ボディ構築
        // ==========================================
        const container = document.getElementById('character-container');
        const scene = new THREE.Scene();
        // カメラの位置を少し引いて体全体を見せる
        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.set(0, -1, 7); 

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- マテリアル（アニメ塗り） ---
        const skinColor = 0xfff3e0;
        const hairColor = 0xff8a80; // 明るいコーラルピンク
        const toonSkin = new THREE.MeshToonMaterial({ color: skinColor });
        const toonHair = new THREE.MeshToonMaterial({ color: hairColor });
        const toonClothes = new THREE.MeshToonMaterial({ color: 0xffffff });

        // 全体をまとめるグループ（体が動く用）
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);

        // --- 【新機能】胴体（ボディ） ---
        const bodyGroup = new THREE.Group();
        characterGroup.add(bodyGroup);
        
        // 首
        const neckGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.8, 32);
        const neck = new THREE.Mesh(neckGeo, toonSkin);
        neck.position.set(0, -1.2, -0.1);
        bodyGroup.add(neck);

        // 服（肩と胸）
        const torsoGeo = new THREE.CylinderGeometry(1.2, 1.4, 2.0, 32);
        const torso = new THREE.Mesh(torsoGeo, toonClothes);
        torso.position.set(0, -2.5, -0.1);
        torso.scale.set(1, 1, 0.6); // 体を平べったくする
        bodyGroup.add(torso);

        // --- 頭部グループ ---
        const headGroup = new THREE.Group();
        characterGroup.add(headGroup);

        // --- 【新機能】頂点操作によるアゴの彫刻 ---
        const headGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const pos = headGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i); let y = pos.getY(i); let z = pos.getZ(i);
            if (y < 0) {
                // 下半分の頂点を弄ってアゴを尖らせる
                const factor = 1 + (y * 0.4); 
                x *= factor; 
                z *= factor * 0.8;
                y -= Math.pow(Math.abs(y), 2) * 0.3; // 下に引っ張る
            } else {
                // おでこを少し平らに
                if (z > 0) z *= 0.95;
            }
            pos.setXYZ(i, x, y, z);
        }
        headGeo.computeVertexNormals();
        const headMesh = new THREE.Mesh(headGeo, toonSkin);
        headGroup.add(headMesh);

        // --- 表情を貼り付ける曲面パネル ---
        const facePlaneGeo = new THREE.PlaneGeometry(2.3, 2.3, 16, 16);
        const fpos = facePlaneGeo.attributes.position;
        for(let i=0; i<fpos.count; i++) {
            let x = fpos.getX(i); let z = fpos.getZ(i);
            // 顔の丸みに合わせてパネルをカーブさせる
            z -= Math.pow(Math.abs(x), 2) * 0.2;
            fpos.setXYZ(i, x, fpos.getY(i), z);
        }
        facePlaneGeo.computeVertexNormals();
        const facePlaneMat = new THREE.MeshBasicMaterial({ map: faceTexture, transparent: true });
        const facePlane = new THREE.Mesh(facePlaneGeo, facePlaneMat);
        facePlane.position.set(0, 0, 1.15); // 顔の表面にピタッと配置
        headGroup.add(facePlane);

        // --- 【新機能】精密な髪の毛構造 ---
        const hairGroup = new THREE.Group();
        headGroup.add(hairGroup);

        // 1. 後ろ髪（顔の前に来ないよう、上半分の球体にする）
        const backHairGeo = new THREE.SphereGeometry(1.25, 32, 32, 0, Math.PI * 2, 0, Math.PI * 0.55);
        const backHair = new THREE.Mesh(backHairGeo, toonHair);
        hairGroup.add(backHair);

        // 2. 前髪（おでこに垂れる円錐）
        for(let i = 0; i < 7; i++) {
            const bangGeo = new THREE.ConeGeometry(0.2, 1.0, 16);
            bangGeo.translate(0, -0.5, 0); // 頂点を中心にする
            const bang = new THREE.Mesh(bangGeo, toonHair);
            const angle = (i - 3) * 0.25; // 左右に扇状に広げる
            bang.position.set(Math.sin(angle)*1.0, 0.8, 1.05);
            bang.rotation.z = -angle * 0.5;
            bang.rotation.x = Math.PI * 0.1;
            hairGroup.add(bang);
        }

        // 3. 横髪（もみあげ）
        for(let i of [-1, 1]) {
            const sideGeo = new THREE.ConeGeometry(0.25, 1.6, 16);
            sideGeo.translate(0, -0.8, 0);
            const side = new THREE.Mesh(sideGeo, toonHair);
            side.position.set(i * 1.15, 0.2, 0.5);
            side.rotation.z = i * 0.1;
            side.rotation.x = Math.PI * 0.05;
            hairGroup.add(side);
        }

        // 照明設定
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(2, 5, 5);
        scene.add(dirLight);

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let target = { rx: 0, ry: 0, rz: 0, bL: 0, bR: 0, mOpen: 0, smile: 0, gX: 0, gY: 0 };
        let current = { rx: 0, ry: 0, rz: 0, bL: 0, bR: 0, mOpen: 0, smile: 0, gX: 0, gY: 0 };

        function animate() {
            requestAnimationFrame(animate);
            current.rx += (target.rx - current.rx) * 0.15;
            current.ry += (target.ry - current.ry) * 0.15;
            current.rz += (target.rz - current.rz) * 0.15;
            current.bL += (target.bL - current.bL) * 0.3;
            current.bR += (target.bR - current.bR) * 0.3;
            current.mOpen += (target.mOpen - current.mOpen) * 0.3;
            current.smile += (target.smile - current.smile) * 0.2;
            current.gX += (target.gX - current.gX) * 0.3;
            current.gY += (target.gY - current.gY) * 0.3;

            // 頭の回転
            headGroup.rotation.set(current.rx, current.ry, current.rz);
            
            // 体の連動（頭が向いた方向に、少しだけ体を向ける）
            bodyGroup.rotation.y = current.ry * 0.4;
            bodyGroup.rotation.z = current.rz * 0.2;
            
            drawAnimeFace(current.bL, current.bR, current.mOpen, current.smile, current.gX, current.gY);
            renderer.render(scene, camera3D);
        }
        animate();

        // ==========================================
        // 3. AI トラッキング（まばたき判定継続）
        // ==========================================
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status");
        const videoElement = document.getElementById("webcam");

        startBtn.addEventListener("click", async () => {
            startBtn.disabled = true;
            statusText.textContent = "AI起動中...";

            try {
                const faceMesh = new FaceMesh({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }});
                
                faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                faceMesh.onResults(onResults);

                const cameraStream = new Camera(videoElement, {
                    onFrame: async () => { await faceMesh.send({image: videoElement}); },
                    width: 480, height: 640
                });
                
                await cameraStream.start();
                videoElement.style.display = "block";
                startBtn.style.display = "none";
                statusText.textContent = "トラッキング中！";
            } catch (error) {
                statusText.textContent = "カメラ接続エラー";
                startBtn.disabled = false;
            }
        });

        function getEAR(lms, top, bottom, left, right) {
            const vDist = Math.hypot(lms[top].x - lms[bottom].x, lms[top].y - lms[bottom].y);
            const hDist = Math.hypot(lms[left].x - lms[right].x, lms[left].y - lms[right].y);
            return vDist / hDist;
        }

        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const lms = results.multiFaceLandmarks[0];
                const faceW = Math.hypot(lms[234].x - lms[454].x, lms[234].y - lms[454].y);
                const faceH = Math.hypot(lms[10].x - lms[152].x, lms[10].y - lms[152].y);
                const midX = (lms[234].x + lms[454].x) / 2;
                const midY = (lms[10].y + lms[152].y) / 2;
                
                target.ry = ((lms[4].x - midX) / faceW) * 2.0; 
                target.rx = -((lms[4].y - midY) / faceH - 0.05) * 2.0;
                target.rz = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x);

                const earL = getEAR(lms, 159, 145, 133, 33);
                const earR = getEAR(lms, 386, 374, 362, 263);
                target.bL = 1 - Math.max(0, Math.min(1, (earL - 0.15) / 0.10));
                target.bR = 1 - Math.max(0, Math.min(1, (earR - 0.15) / 0.10));

                const mouthDist = Math.hypot(lms[13].x - lms[14].x, lms[13].y - lms[14].y);
                target.mOpen = Math.min(1, Math.max(0, (mouthDist / faceH - 0.02) * 6));
                const smileDist = Math.hypot(lms[61].x - lms[291].x, lms[61].y - lms[291].y);
                target.smile = Math.min(1, Math.max(0, (smileDist / faceW - 0.35) * 5));

                target.gX = target.ry * -30; target.gY = target.rx * -30;
            }
        }
    </script>
</body>
</html>
