<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3D Avatar - Horror Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        /* ホラーゲームのような暗闇の背景 */
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #fff; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* 3Dを描画するキャンバス領域 */
        #character-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        #controls { position: absolute; bottom: 40px; width: 100%; max-width: 400px; text-align: center; z-index: 999; }
        .btn { display: inline-block; width: 90%; padding: 18px; background: rgba(150, 0, 0, 0.8); color: white; border: 1px solid #ff4444; border-radius: 4px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); cursor: pointer; backdrop-filter: blur(5px); text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { background: rgba(200, 0, 0, 1); transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 0.9rem; color: #888; font-family: monospace; letter-spacing: 1px; }
        
        /* カメラ映像はホラーっぽくモノクロ＆ノイズ風に */
        #webcam { position: absolute; top: 20px; right: 20px; width: 80px; height: 100px; object-fit: cover; border: 1px solid #333; transform: scaleX(-1); z-index: 5; display: none; filter: grayscale(100%) contrast(150%); opacity: 0.5; }
        #debug-log { display: none; }
    </style>
    
    <!-- AIライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <!-- 本格的な3Dレンダリングエンジン Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <div id="character-container"></div>

    <div id="controls">
        <button id="start-btn" class="btn">Initialize Entity</button>
        <p id="status">System Offline.</p>
    </div>

    <script>
        // ==========================================
        // 1. Three.js による本格3Dシーンの構築
        // ==========================================
        const container = document.getElementById('character-container');
        const scene = new THREE.Scene();
        // ホラーっぽく環境霧（フォグ）を設定
        scene.fog = new THREE.FogExp2(0x050505, 0.15);

        const camera3D = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera3D.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // スマホの負荷軽減
        container.appendChild(renderer.domElement);

        // ーーー 3Dオブジェクトの作成 ーーー
        const headGroup = new THREE.Group();
        scene.add(headGroup);

        // 顔のベース（金属質で不気味な質感の球体）
        const headGeo = new THREE.SphereGeometry(1.2, 64, 64);
        const headMat = new THREE.MeshStandardMaterial({ 
            color: 0xaaaaaa, 
            roughness: 0.2, // ツヤツヤにする
            metalness: 0.8  // 金属っぽくする
        });
        const head = new THREE.Mesh(headGeo, headMat);
        headGroup.add(head);

        // 目の材質（自ら赤く発光するマテリアル）
        const eyeGeo = new THREE.SphereGeometry(0.18, 32, 32);
        const eyeMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            emissive: 0xaa0000, // 暗闇で光る
            emissiveIntensity: 1
        });
        
        // 左目
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-0.45, 0.2, 1.05);
        headGroup.add(eyeL);
        
        // 右目
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.45, 0.2, 1.05);
        headGroup.add(eyeR);

        // 口（ポッカリと開いた黒い穴）
        const mouthGeo = new THREE.BoxGeometry(0.5, 0.05, 0.4);
        const mouthMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.position.set(0, -0.6, 1.1);
        headGroup.add(mouth);

        // ーーー 照明（ライティング） ーーー
        // 全体をうっすら照らす青白い光
        const ambientLight = new THREE.AmbientLight(0x222244);
        scene.add(ambientLight);

        // 下から顔を不気味に照らす赤いライト（ホラー演出の定番）
        const pointLight = new THREE.PointLight(0xff2222, 1.5, 10);
        pointLight.position.set(0, -3, 2);
        scene.add(pointLight);

        // 正面からのメインライト
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(2, 2, 5);
        scene.add(dirLight);

        // 画面サイズ変更対応
        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 動きを滑らかにするための変数（LERP用）
        let target = { rx: 0, ry: 0, rz: 0, eyeL: 1, eyeR: 1, mouth: 1 };
        let current = { rx: 0, ry: 0, rz: 0, eyeL: 1, eyeR: 1, mouth: 1 };

        // 3D空間のレンダリングループ
        function animate() {
            requestAnimationFrame(animate);
            
            // AIからの生の数値を直接適用せず、1フレームごとに「少しずつ近づける」ことで
            // スマホカメラ特有のカクつきを完全に消し、重厚感のある3Dの動きにする
            current.rx += (target.rx - current.rx) * 0.15;
            current.ry += (target.ry - current.ry) * 0.15;
            current.rz += (target.rz - current.rz) * 0.15;
            current.eyeL += (target.eyeL - current.eyeL) * 0.3;
            current.eyeR += (target.eyeR - current.eyeR) * 0.3;
            current.mouth += (target.mouth - current.mouth) * 0.3;

            headGroup.rotation.set(current.rx, current.ry, current.rz);
            
            // 目の開閉はY軸方向のスケール（潰す）で表現
            eyeL.scale.y = Math.max(0.01, current.eyeL);
            eyeR.scale.y = Math.max(0.01, current.eyeR);
            
            // 口の開閉
            mouth.scale.y = Math.max(0.01, current.mouth);

            // 頭全体をゆっくりフワフワ上下させる（不気味な浮遊感）
            headGroup.position.y = Math.sin(Date.now() * 0.002) * 0.1;

            renderer.render(scene, camera3D);
        }
        animate(); // ループ開始


        // ==========================================
        // 2. AI トラッキング（修正済み高精度版）
        // ==========================================
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status");
        const videoElement = document.getElementById("webcam");
        let cameraStream;

        startBtn.addEventListener("click", async () => {
            startBtn.disabled = true;
            startBtn.textContent = "Connecting...";
            statusText.textContent = "Loading AI models...";

            try {
                const faceMesh = new FaceMesh({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                }});
                
                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                faceMesh.onResults(onResults);

                cameraStream = new Camera(videoElement, {
                    onFrame: async () => { await faceMesh.send({image: videoElement}); },
                    width: 480, height: 640
                });
                
                await cameraStream.start();
                videoElement.style.display = "block";
                startBtn.style.display = "none";
                statusText.textContent = "> Target Acquired.";

            } catch (error) {
                statusText.textContent = "Error: Camera access denied.";
                startBtn.disabled = false;
                startBtn.textContent = "Retry";
            }
        });

        // EAR (Eye Aspect Ratio) を計算するプロ仕様の関数
        // 顔の大きさや距離に影響されず、目の「縦横比」だけで開閉を判定します
        function getEAR(lms, top, bottom, left, right) {
            const vDist = Math.hypot(lms[top].x - lms[bottom].x, lms[top].y - lms[bottom].y);
            const hDist = Math.hypot(lms[left].x - lms[right].x, lms[left].y - lms[right].y);
            return vDist / hDist;
        }

        function onResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const lms = results.multiFaceLandmarks[0];
                
                // --- 1. 顔の3D回転 ---
                const faceW = Math.hypot(lms[234].x - lms[454].x, lms[234].y - lms[454].y);
                const faceH = Math.hypot(lms[10].x - lms[152].x, lms[10].y - lms[152].y);
                const midX = (lms[234].x + lms[454].x) / 2;
                const midY = (lms[10].y + lms[152].y) / 2;
                
                // Yaw (左右の首振り) / Pitch (上下の首振り)
                target.ry = ((lms[4].x - midX) / faceW) * 2.0; 
                target.rx = -((lms[4].y - midY) / faceH - 0.05) * 2.0;
                // Roll (首をかしげる)
                target.rz = -Math.atan2(lms[263].y - lms[33].y, lms[263].x - lms[33].x);

                // --- 2. 目の開閉（EAR計算式でバグを解消） ---
                // 左目(向かって右): 159(上), 145(下), 133(内), 33(外)
                const earL = getEAR(lms, 159, 145, 133, 33);
                // 右目(向かって左): 386(上), 374(下), 362(内), 263(外)
                const earR = getEAR(lms, 386, 374, 362, 263);

                // EARは通常 0.10(完全閉じ) ～ 0.25(開き) の間になる。
                // 余裕を持たせてマッピングすることで、薄目を開けている時でも判定がブレない
                target.eyeL = Math.max(0, Math.min(1, (earL - 0.12) / 0.12));
                target.eyeR = Math.max(0, Math.min(1, (earR - 0.12) / 0.12));

                // --- 3. 口の開閉 ---
                const mouthDist = Math.hypot(lms[13].x - lms[14].x, lms[13].y - lms[14].y);
                // 口の開き具合をアゴの長さを基準に算出（距離バグ防止）
                target.mouth = Math.max(1, (mouthDist / faceH) * 25);
            }
        }
    </script>
</body>
</html>
